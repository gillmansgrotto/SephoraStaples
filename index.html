  ...APPLICATION_ORDER.map((n) => CATEGORIES.find((c) => c.name === n)).filter(Boolean),
  ...CATEGORIES.filter((c) => !APPLICATION_ORDER.includes(c.name)),
];

// ====== SETUP: paste your Firebase Realtime Database URL between the quotes ======
// It looks like: https://something-default-rtdb.firebaseio.com
const DB_URL = "https://rose-sephora-staples-default-rtdb.firebaseio.com";
// =================================================================================

const STORAGE_KEY = "sephora-tracker-v1";

// Status cycle: 0 = untracked, 1 = wishlist, 2 = got it
const STATUS = {
  0: { label: "Tap to track", short: "—" },
  1: { label: "Want to get", short: "♡" },
  2: { label: "In makeup bag", short: "✓" },
};

// Marked In The Bag by default (one-time seed)
const SEED_IN_BAG = [
  "Lipstick::ABH Matte & Satin Velvet Lipstick",
  "Mascara::Ilia Limitless Lash",
  "Primer::Hourglass Veil Mineral Primer",
  "Skin Prep::Rhode Peptide Eye Prep Patches",
  "Skin Prep::Caudalie Beauty Elixir Face Mist",
];

const LAST_SEEN_KEY = "sephora-tracker-last-seen";

function SephoraTracker() {
  const [state, setState] = useState({});
  const [custom, setCustom] = useState({}); // { [categoryName]: [{name, q, url?}] }
  const [removed, setRemoved] = useState([]); // keys of hidden built-in products
  const [loaded, setLoaded] = useState(false);
  const [filter, setFilter] = useState("all"); // all | wishlist | owned | starred
  const [addingTo, setAddingTo] = useState(null); // category name with open add form
  const [newName, setNewName] = useState("");
  const [newLink, setNewLink] = useState("");
  const [shades, setShades] = useState({}); // { [itemKey]: "shade / color text" }
  const [editingShade, setEditingShade] = useState(null); // itemKey being edited
  const [shadeText, setShadeText] = useState("");
  const [stars, setStars] = useState({}); // { [itemKey]: true }
  const [notes, setNotes] = useState({}); // { [itemKey]: "note text" }
  const [editingNote, setEditingNote] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [updatedAt, setUpdatedAt] = useState({}); // { [itemKey]: timestamp }
  const [changedKeys, setChangedKeys] = useState([]); // keys changed since this device last looked
  const [collapsed, setCollapsed] = useState({}); // { [catName]: true }
  const [collapsedInit, setCollapsedInit] = useState(false);
  const [copied, setCopied] = useState(false);
  const [copyFallback, setCopyFallback] = useState("");

  const loadShared = async () => {
    let statuses = {};
    let customItems = {};
    let removedKeys = [];
    let shadeMap = {};
    let starMap = {};
    let noteMap = {};
    let updatedMap = {};
    let collapsedMap = null;
    let seeded = false;
    let seededV2 = false;
    try {
      const resp = await fetch(`${DB_URL}/tracker.json`);
      const parsed = resp.ok ? await resp.json() : null;
      if (parsed) {
        if (parsed && parsed.statuses) {
          statuses = parsed.statuses || {};
          customItems = parsed.custom || {};
          removedKeys = parsed.removed || [];
          shadeMap = parsed.shades || {};
          starMap = parsed.stars || {};
          noteMap = parsed.notes || {};
          updatedMap = parsed.updatedAt || {};
          collapsedMap = parsed.collapsed || null;
          seeded = parsed.seeded === true;
          seededV2 = parsed.seededV2 === true;
        } else {
          // legacy format: plain status map
          statuses = parsed || {};
        }
      }
    } catch (e) {
      // no saved data yet — start fresh
    }
    if (!seeded) {
      SEED_IN_BAG.forEach((key) => {
        if (!(key in statuses)) statuses[key] = 2;
      });
    }
    // v2: make sure every product the user added (links + custom) is marked In Makeup Bag
    if (!seededV2) {
      SEED_IN_BAG.forEach((key) => {
        statuses[key] = 2;
      });
      Object.keys(customItems).forEach((catName) => {
        (customItems[catName] || []).forEach((i) => {
          const key = `${catName}::${i.name}`;
          if (!(key in statuses)) statuses[key] = 2;
        });
      });
    }
    // Recently-changed: compare shared timestamps against this device's last look (personal storage)
    let lastSeen = 0;
    try {
      const seen = localStorage.getItem(LAST_SEEN_KEY);
      if (seen) lastSeen = Number(seen) || 0;
    } catch (e) {
      // first visit on this device
    }
    setChangedKeys(
      lastSeen > 0 ? Object.keys(updatedMap).filter((k) => updatedMap[k] > lastSeen) : []
    );
    try {
      localStorage.setItem(LAST_SEEN_KEY, String(Date.now()));
    } catch (e) {
      // personal storage unavailable — indicator just won't persist
    }
    setState(statuses);
    setCustom(customItems);
    setRemoved(removedKeys);
    setShades(shadeMap);
    setStars(starMap);
    setNotes(noteMap);
    setUpdatedAt(updatedMap);
    if (collapsedMap && Object.keys(collapsedMap).length > 0) {
      setCollapsed(collapsedMap);
      setCollapsedInit(true);
    }
    setLoaded(true);
    if (!seeded || !seededV2) {
      try {
        await fetch(`${DB_URL}/tracker.json`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ statuses, custom: customItems, removed: removedKeys, shades: shadeMap, stars: starMap, notes: noteMap, updatedAt: updatedMap, seeded: true, seededV2: true }),
        });
      } catch (e) {
        // storage not available yet (unpublished) — seed still shows locally
      }
    }
  };

  useEffect(() => {
    loadShared();
  }, []);

  const persist = async (changes) => {
    const data = {
      statuses: changes.statuses !== undefined ? changes.statuses : state,
      custom: changes.custom !== undefined ? changes.custom : custom,
      removed: changes.removed !== undefined ? changes.removed : removed,
      shades: changes.shades !== undefined ? changes.shades : shades,
      stars: changes.stars !== undefined ? changes.stars : stars,
      notes: changes.notes !== undefined ? changes.notes : notes,
      updatedAt: changes.updatedAt !== undefined ? changes.updatedAt : updatedAt,
      collapsed: changes.collapsed !== undefined ? changes.collapsed : collapsed,
      seeded: true,
      seededV2: true,
    };
    setState(data.statuses);
    setCustom(data.custom);
    setRemoved(data.removed);
    setShades(data.shades);
    setStars(data.stars);
    setNotes(data.notes);
    setUpdatedAt(data.updatedAt);
    setCollapsed(data.collapsed);
    try {
      await fetch(`${DB_URL}/tracker.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
    } catch (e) {
      console.error("Save failed", e);
    }
  };

  const touch = (key) => ({ ...updatedAt, [key]: Date.now() });

  const saveShade = (key) => {
    const text = shadeText.trim();
    const nextShades = { ...shades };
    if (text) nextShades[key] = text;
    else delete nextShades[key];
    persist({ shades: nextShades, updatedAt: touch(key) });
    setEditingShade(null);
    setShadeText("");
  };

  const saveNote = (key) => {
    const text = noteText.trim();
    const nextNotes = { ...notes };
    if (text) nextNotes[key] = text;
    else delete nextNotes[key];
    persist({ notes: nextNotes, updatedAt: touch(key) });
    setEditingNote(null);
    setNoteText("");
  };

  const toggleStar = (key) => {
    const next = { ...stars };
    if (next[key]) delete next[key];
    else next[key] = true;
    persist({ stars: next, updatedAt: touch(key) });
  };

  const cycle = (key) => {
    const cur = state[key] || 0;
    const next = { ...state, [key]: (cur + 1) % 3 };
    if (next[key] === 0) delete next[key];
    persist({ statuses: next, updatedAt: touch(key) });
  };

  const addProduct = (catName) => {
    const name = newName.trim();
    if (!name) return;
    const link = newLink.trim();
    const entry = { name, q: name };
    if (link && /^https?:\/\//i.test(link)) entry.url = link;
    const list = [...(custom[catName] || []), entry];
    persist({ custom: { ...custom, [catName]: list }, updatedAt: touch(`${catName}::${name}`) });
    setNewName("");
    setNewLink("");
    setAddingTo(null);
  };

  const removeProduct = (catName, item) => {
    const key = `${catName}::${item.name}`;
    const nextStatuses = { ...state };
    delete nextStatuses[key];
    const nextShades = { ...shades };
    delete nextShades[key];
    const nextStars = { ...stars };
    delete nextStars[key];
    const nextNotes = { ...notes };
    delete nextNotes[key];
    const base = { statuses: nextStatuses, shades: nextShades, stars: nextStars, notes: nextNotes, updatedAt: touch(key) };
    if (item.isCustom) {
      const list = (custom[catName] || []).filter((i) => i.name !== item.name);
      const nextCustom = { ...custom, [catName]: list };
      if (list.length === 0) delete nextCustom[catName];
      persist({ ...base, custom: nextCustom });
    } else {
      persist({ ...base, removed: [...removed, key] });
    }
  };

  const restoreRemoved = () => {
    persist({ removed: [] });
  };

  const [confirmingReset, setConfirmingReset] = useState(false);
  const [sectionQuery, setSectionQuery] = useState("");
  const [showTopBtn, setShowTopBtn] = useState(false);

  useEffect(() => {
    const onScroll = () => setShowTopBtn(window.scrollY > 400);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const jumpToSection = (catName) => {
    setCollapsed((prev) => ({ ...prev, [catName]: false }));
    setSectionQuery("");
    setTimeout(() => {
      const el = document.getElementById(`cat-${catName}`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  };

  const scrollToTop = () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const copyWishlist = async () => {
    const lines = [];
    ORDERED_CATEGORIES.forEach((cat) => {
      const wanted = itemsFor(cat).filter((i) => state[`${cat.name}::${i.name}`] === 1);
      wanted.forEach((i) => {
        const key = `${cat.name}::${i.name}`;
        let line = `• ${i.name} (${cat.name})`;
        if (shades[key]) line += ` — shade: ${shades[key]}`;
        if (notes[key]) line += ` — ${notes[key]}`;
        if (stars[key]) line = line.replace("• ", "• ★ ");
        lines.push(line);
      });
    });
    const text = lines.length
      ? `Rose's Sephora Want-to-Get list:\n${lines.join("\n")}`
      : "Nothing on the Want-to-Get list yet.";
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch (e) {
      setCopyFallback(text); // clipboard blocked — show the text to copy manually
    }
  };

  const reset = () => {
    if (!confirmingReset) {
      setConfirmingReset(true);
      setTimeout(() => setConfirmingReset(false), 3500);
      return;
    }
    setConfirmingReset(false);
    persist({ statuses: {} });
  };

  const itemsFor = (cat) => [
    ...cat.items.filter((i) => !removed.includes(`${cat.name}::${i.name}`)),
    ...(custom[cat.name] || []).map((i) => ({ ...i, isCustom: true })),
  ];

  useEffect(() => {
    if (!loaded || collapsedInit) return;
    const init = {};
    ORDERED_CATEGORIES.forEach((cat) => {
      const hasActivity = itemsFor(cat).some((i) => {
        const key = `${cat.name}::${i.name}`;
        return state[key] || shades[key] || notes[key] || stars[key];
      });
      init[cat.name] = !hasActivity;
    });
    setCollapsed(init);
    setCollapsedInit(true);
  }, [loaded]);

  const toggleCollapse = (catName) => {
    const next = { ...collapsed, [catName]: !collapsed[catName] };
    persist({ collapsed: next });
  };

  const allItems = CATEGORIES.flatMap((c) => itemsFor(c).map((i) => `${c.name}::${i.name}`));
  const ownedCount = allItems.filter((k) => state[k] === 2).length;
  const wishCount = allItems.filter((k) => state[k] === 1).length;
  const starCount = allItems.filter((k) => stars[k]).length;
  const pct = Math.round((ownedCount / allItems.length) * 100);

  const visible = (key) => {
    const s = state[key] || 0;
    if (filter === "wishlist") return s === 1;
    if (filter === "owned") return s === 2;
    if (filter === "starred") return !!stars[key];
    return true;
  };

  const q = sectionQuery.trim().toLowerCase();
  const sectionMatches = q
    ? ORDERED_CATEGORIES.filter(
        (c) =>
          c.name.toLowerCase().includes(q) ||
          itemsFor(c).some((i) => i.name.toLowerCase().includes(q))
      ).slice(0, 5)
    : [];

  return (
    <div style={styles.page}>
      <div style={styles.inner}>
      <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;700&display=swap"
        rel="stylesheet"
      />

      {/* Header */}
      <header style={styles.header}>
        <div style={styles.eyebrow}>ROSE KELLEY'S</div>
        <h1 style={styles.title}>Sephora Staples</h1>
        <p style={styles.tagline}>Because she deserves the best of everything</p>
        <p style={styles.subtitle}>{allItems.length} potential additions · {CATEGORIES.length} categories · tap once for want to get ♡, twice for in makeup bag ✓</p>
      </header>

      {/* Lipstick progress meter — the signature */}
      <div style={styles.meterWrap}>
        <div style={styles.meterLabelRow}>
          <span style={styles.meterLabel}>{ownedCount} of {allItems.length} in makeup bag</span>
          <span style={{ ...styles.meterLabel, color: "#B98A4E" }}>{wishCount} want to get</span>
        </div>
        <div style={styles.meterTube} aria-label={`Progress: ${pct}%`}>
          <div style={{ ...styles.meterFill, width: `${Math.max(pct, 2)}%` }} />
          <div style={{ ...styles.meterTip, left: `calc(${Math.max(pct, 2)}% - 7px)` }} />
        </div>
      </div>

      {/* Filters */}
      <div style={styles.filterRow} role="tablist">
        {[
          ["all", "Staples"],
          ["wishlist", `Want to Get ♡${wishCount ? ` (${wishCount})` : ""}`],
          ["owned", `In Makeup Bag 🛍️${ownedCount ? ` (${ownedCount})` : ""}`],
          ["starred", `Top Picks ★${starCount ? ` (${starCount})` : ""}`],
        ].map(([val, label]) => (
          <button
            key={val}
            role="tab"
            aria-selected={filter === val}
            onClick={() => setFilter(val)}
            style={{ ...styles.filterBtn, ...(filter === val ? styles.filterBtnActive : {}) }}
          >
            {label}
          </button>
        ))}
      </div>

      <div style={styles.jumpRow}>
        <input
          style={styles.jumpInput}
          placeholder="Jump to Staple Section"
          value={sectionQuery}
          onChange={(e) => setSectionQuery(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter" && sectionMatches.length > 0) jumpToSection(sectionMatches[0].name);
          }}
        />
        <button onClick={loadShared} style={styles.syncBtnTop}>
          Refresh List ↑
        </button>
      </div>
      {sectionMatches.length > 0 && (
        <div style={styles.jumpChips}>
          {sectionMatches.map((c) => (
            <button key={c.name} style={styles.jumpChip} onClick={() => jumpToSection(c.name)}>
              {c.name}
            </button>
          ))}
        </div>
      )}

      {/* Categories */}
      {!loaded ? (
        <p style={styles.loading}>Opening the vanity…</p>
      ) : (
        <main>
          {ORDERED_CATEGORIES.map((cat, ci) => {
            const items = [...itemsFor(cat)].sort(
              (a, b) =>
                ((state[`${cat.name}::${a.name}`] || 0) === 2 ? 1 : 0) -
                ((state[`${cat.name}::${b.name}`] || 0) === 2 ? 1 : 0)
            );
            const keys = items.map((i) => `${cat.name}::${i.name}`);
            const shown = keys.filter(visible);
            if (shown.length === 0 && filter !== "all") return null;
            const catOwned = keys.filter((k) => state[k] === 2).length;
            const isCollapsed = filter === "all" && collapsed[cat.name];
            const catHasChanges = keys.some((k) => changedKeys.includes(k));
            return (
              <section key={cat.name} id={`cat-${cat.name}`} style={styles.category}>
                <div
                  style={{ ...styles.catHeader, cursor: "pointer" }}
                  onClick={() => toggleCollapse(cat.name)}
                  role="button"
                  aria-expanded={!isCollapsed}
                >
                  <h2 style={styles.catTitle}>
                    <span style={styles.stepNum}>{String(ci + 1).padStart(2, "0")}</span>
                    {cat.name}
                    {catHasChanges && <span style={styles.changedDot} title="Updated since your last visit">●</span>}
                  </h2>
                  <span style={styles.catCount}>
                    {catOwned}/{items.length}
                    <span style={styles.caret}>{isCollapsed ? "▸" : "▾"}</span>
                  </span>
                </div>
                {!isCollapsed && (
                <div>
                  {items.map((item) => {
                    const key = `${cat.name}::${item.name}`;
                    if (!visible(key)) return null;
                    const s = state[key] || 0;
                    return (
                      <div
                        key={key}
                        onClick={() => cycle(key)}
                        role="button"
                        tabIndex={0}
                        onKeyDown={(e) => {
                          if (e.key === "Enter" || e.key === " ") cycle(key);
                        }}
                        style={{
                          ...styles.itemRow,
                          ...(s === 2 ? styles.itemOwned : s === 1 ? styles.itemWish : {}),
                        }}
                        aria-label={`${item.name}: ${STATUS[s].label}`}
                      >
                        <span
                          style={{
                            ...styles.badge,
                            ...(s === 2 ? styles.badgeOwned : s === 1 ? styles.badgeWish : {}),
                          }}
                        >
                          {STATUS[s].short}
                        </span>
                        <span
                          style={{
                            ...styles.itemName,
                            ...(s === 2 ? { opacity: 0.7 } : {}),
                          }}
                        >
                          {item.name}
                          {editingShade === key ? (
                            <span style={styles.shadeEditWrap} onClick={(e) => e.stopPropagation()}>
                              <input
                                style={styles.shadeInput}
                                placeholder="Color / shade"
                                value={shadeText}
                                onChange={(e) => setShadeText(e.target.value)}
                                onKeyDown={(e) => {
                                  if (e.key === "Enter") saveShade(key);
                                  if (e.key === "Escape") {
                                    setEditingShade(null);
                                    setShadeText("");
                                  }
                                }}
                                autoFocus
                              />
                              <button style={styles.shadeSaveBtn} onClick={() => saveShade(key)}>
                                Save
                              </button>
                            </span>
                          ) : (
                            <span
                              style={shades[key] ? styles.shadeText : styles.shadeAdd}
                              onClick={(e) => {
                                e.stopPropagation();
                                setEditingShade(key);
                                setShadeText(shades[key] || "");
                              }}
                            >
                              {shades[key] ? `${shades[key]} ✎` : "+ add color"}
                            </span>
                          )}
                          {editingNote === key ? (
                            <span style={styles.shadeEditWrap} onClick={(e) => e.stopPropagation()}>
                              <input
                                style={styles.shadeInput}
                                placeholder="Note (e.g. wants the mini size)"
                                value={noteText}
                                onChange={(e) => setNoteText(e.target.value)}
                                onKeyDown={(e) => {
                                  if (e.key === "Enter") saveNote(key);
                                  if (e.key === "Escape") {
                                    setEditingNote(null);
                                    setNoteText("");
                                  }
                                }}
                                autoFocus
                              />
                              <button style={styles.shadeSaveBtn} onClick={() => saveNote(key)}>
                                Save
                              </button>
                            </span>
                          ) : (
                            <span
                              style={notes[key] ? styles.noteText : styles.shadeAdd}
                              onClick={(e) => {
                                e.stopPropagation();
                                setEditingNote(key);
                                setNoteText(notes[key] || "");
                              }}
                            >
                              {notes[key] ? `📝 ${notes[key]} ✎` : "+ add note"}
                            </span>
                          )}
                          <span style={styles.statusHintInline}>
                            {changedKeys.includes(key) ? "● Updated · " : ""}
                            {item.isCustom ? "Added to the list · " : ""}
                            {STATUS[s].label}
                          </span>
                        </span>
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            toggleStar(key);
                          }}
                          style={{ ...styles.starBtn, ...(stars[key] ? styles.starBtnActive : {}) }}
                          aria-label={stars[key] ? `Unstar ${item.name}` : `Star ${item.name} as a top pick`}
                        >
                          {stars[key] ? "★" : "☆"}
                        </button>
                        <a
                          href={item.url || sephoraUrl(item.q)}
                          target="_blank"
                          rel="noopener noreferrer"
                          onClick={(e) => e.stopPropagation()}
                          style={styles.shopLink}
                          aria-label={`Shop ${item.name} on Sephora`}
                        >
                          Shop ↗
                        </a>
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            removeProduct(cat.name, item);
                          }}
                          style={styles.removeBtn}
                          aria-label={`Remove ${item.name}`}
                        >
                          ×
                        </button>
                      </div>
                    );
                  })}

                  {filter === "all" && (
                    addingTo === cat.name ? (
                      <div style={styles.addForm} onClick={(e) => e.stopPropagation()}>
                        <input
                          style={styles.addInput}
                          placeholder="Product name"
                          value={newName}
                          onChange={(e) => setNewName(e.target.value)}
                          autoFocus
                        />
                        <input
                          style={styles.addInput}
                          placeholder="Sephora link (optional)"
                          value={newLink}
                          onChange={(e) => setNewLink(e.target.value)}
                        />
                        <div style={styles.addFormRow}>
                          <button style={styles.addConfirmBtn} onClick={() => addProduct(cat.name)}>
                            Add to {cat.name}
                          </button>
                          <button
                            style={styles.addCancelBtn}
                            onClick={() => {
                              setAddingTo(null);
                              setNewName("");
                              setNewLink("");
                            }}
                          >
                            Cancel
                          </button>
                        </div>
                      </div>
                    ) : (
                      <button style={styles.addRowBtn} onClick={() => setAddingTo(cat.name)}>
                        + Add a product
                      </button>
                    )
                  )}
                </div>
                )}
              </section>
            );
          })}

          {filter !== "all" && ownedCount === 0 && wishCount === 0 && (
            <p style={styles.empty}>Nothing tracked yet — tap any item to start.</p>
          )}

          <div style={styles.bottomActions}>
          <button onClick={copyWishlist} style={styles.syncBtn}>
            {copied ? "Copied! 💕" : "Copy Want-to-Get list 📋"}
          </button>
          {copyFallback && (
            <div style={styles.copyFallbackWrap}>
              <p style={styles.footnote}>Couldn't reach the clipboard — long-press to copy from here:</p>
              <textarea
                style={styles.copyFallbackBox}
                readOnly
                value={copyFallback}
                onFocus={(e) => e.target.select()}
              />
              <button style={styles.resetBtn} onClick={() => setCopyFallback("")}>
                Close
              </button>
            </div>
          )}
          <button onClick={loadShared} style={styles.syncBtn}>
            Refresh List ↑
          </button>
          {removed.length > 0 && (
            <button onClick={restoreRemoved} style={styles.resetBtn}>
              Restore removed products ({removed.length})
            </button>
          )}
          <button onClick={reset} style={styles.resetBtn}>
            {confirmingReset ? "Tap again to clear everything" : "Clear all"}
          </button>
          </div>
          <p style={styles.footnote}>Shared list — checkmarks save for everyone with the link. Tap sync to see the latest.</p>
        </main>
      )}
      {showTopBtn && (
        <button onClick={scrollToTop} style={styles.topBtn} aria-label="Back to top">
          ↑ Top
        </button>
      )}
      </div>
    </div>
  );
}
